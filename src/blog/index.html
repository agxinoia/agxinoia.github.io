<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting — Arki</title>
    <!-- Canonical redirect: /blog/ → / (preserves query string and hash) -->
    <script>
        (function () {
            var search = window.location.search;
            var hash   = window.location.hash;
            // Forward ?post= or any other query params + hash to the root
            window.location.replace('/' + search + hash);
        })();
    </script>
    <meta http-equiv="refresh" content="0;url=/">
    <style>
        body { background:#050505; color:#737373; font-family:Inter,sans-serif;
               display:flex; align-items:center; justify-content:center;
               min-height:100vh; margin:0; font-size:.9rem; }
    </style>
</head>
<body>
    Redirecting… <a href="/" style="color:#ededed;margin-left:.5rem;">click here if not redirected</a>
</body>
</html>
